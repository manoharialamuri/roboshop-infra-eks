bastion:
#bastion accepting connection from internet
- name: bastion_internet
  port: 22
  src: internet
  dest: bastion  
mongodb:
#mongodb accepting connection from bastion
- name: mongodb_bastion
  port: 22
  src: bastion
  dest: mongodb

#mongodb accepting connection from catalogue
- name: mongodb_catalogue
  port: 27017
  src: catalogue
  dest: mongodb
#mongodb accepting connection from user
- name: mongodb_user
  port: 27017
  src: user
  dest: mongodb

#redis accepting connection from bastion
- name: redis_bastion
  port: 22
  src: bastion
  dest: redis

  

